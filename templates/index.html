<!DOCTYPE html>
<html>
<head>
    <meta charset="utf8">
    <title>掲示板</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 20px;
        } 
        h1,h2 {
            text-align: center;
        } 

        .container {
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0,0.1);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-post {
            background: #4CAF50;
            color: white;
        }

        .btn-like {
            background: #3498db;
            color: white;
            margin-right: 5px;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .post {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time {
            font-size: 12px;
            color: gray;
        }
</style>
</head>

<body>

<div class="container">

<h1>掲示板</h1>
<div class="card">
<form action="/post" method="post">
    <input name="name" placeholder="名前" required>
    <textarea name="message" placeholder="メッセージ" required></textarea>
    <button class="btn-post">投稿</button>
</form>
</div>

<h2>投稿一覧</h2>

<div class="card">
{% for post in posts %}

    <div class="post">

    <div>
        <strong>{{post[1]}}</strong><br>
        {{post[2]}}<br>
        <span class="time">{{ post[3] or '' }}</span>
    </div>

    <!-- いいね -->
     <form action="/like/{{ post[0] }}" method="post" style="display:inline;">
        <button class="btn-like">👍 {{ post[4] or 0 }}</button>
    </form>

    <!--削除ボタン-->
    <form action="/delete/{{ post[0] }}" method="post">
        <button class="btn-delete"
            onclick="return confirm('本当に削除しますか？')">削除
        </button>
    </form>
    </div>
{% endfor %}
</div>

</div>
</body>
</html>
